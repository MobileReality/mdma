# MDMA Author Prompt — Eval Test Cases
#
# Each test sends a user request containing an exact MDMA blueprint to the
# LLM with the MDMA author system prompt, and asserts that the generated
# output matches the prescribed structure.

# ---------------------------------------------------------------------------
# 1. Simple contact form
# ---------------------------------------------------------------------------
- description: Generates a contact form matching blueprint
  vars:
    request: |
      Create a contact form matching this exact structure:

      ```mdma
      type: form
      id: contact-form
      fields:
        - name: full-name
          type: text
          label: "Full Name"
          required: true
        - name: email
          type: email
          label: "Email Address"
          required: true
          sensitive: true
        - name: message
          type: textarea
          label: "Message"
          required: true
      ```
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 3
    - type: javascript
      value: file://assertions/has-sensitive.mjs

# ---------------------------------------------------------------------------
# 2. PII sensitivity — email, phone, SSN must be marked sensitive
# ---------------------------------------------------------------------------
- description: Marks PII fields as sensitive
  vars:
    request: |
      Create a form to collect employee info matching this exact structure:

      ```mdma
      type: form
      id: employee-pii-form
      fields:
        - name: full-name
          type: text
          label: "Full Name"
          required: true
        - name: email
          type: email
          label: "Email Address"
          required: true
          sensitive: true
        - name: phone
          type: text
          label: "Phone Number"
          sensitive: true
        - name: ssn
          type: text
          label: "Social Security Number"
          required: true
          sensitive: true
      ```
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 4
    - type: javascript
      value: file://assertions/pii-sensitive.mjs

# ---------------------------------------------------------------------------
# 3. Thinking block appears before other components
# ---------------------------------------------------------------------------
- description: Includes a thinking block before main content
  vars:
    request: |
      Create a callout matching this exact structure:

      ```mdma
      type: callout
      id: maintenance-warning
      variant: warning
      title: "Scheduled Maintenance"
      content: "Our systems will be undergoing maintenance this weekend from Saturday 10 PM to Sunday 6 AM EST."
      dismissible: true
