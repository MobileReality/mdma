      body:
        subject: "{{ticket-form.subject}}"
        description: "{{ticket-form.description}}"
      trigger: submit-ticket
      ```
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, webhook]
    - type: javascript
      value: file://assertions/has-webhook.mjs

