  assert:
    - type: javascript
      value: file://assertions/thinking-first.mjs
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [callout]

# ---------------------------------------------------------------------------
# 4. No markdown wrapping — output should not be in ```markdown fences
# ---------------------------------------------------------------------------
- description: Does not wrap output in markdown fences
  vars:
    request: |
      Create a button matching this exact structure:

      ```mdma
      type: button
      id: submit-report-btn
      text: "Submit Report"
      variant: primary
      onAction: submit-report
      ```
  assert:
    - type: not-contains
      value: "```markdown"
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [button]

