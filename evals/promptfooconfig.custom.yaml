# MDMA Author + Custom System Prompt — promptfoo evaluation config
#
# Tests that a user's custom system prompt works correctly when layered
# on top of the MDMA author prompt via buildSystemPrompt({ customPrompt }).
#
# Run:  pnpm --filter @mobile-reality/mdma-evals eval:custom
# View: pnpm --filter @mobile-reality/mdma-evals eval:view

description: MDMA Author + Custom System Prompt Eval

envPath: .env
outputPath: results-custom.json

prompts:
  - file://prompt-custom.mjs

providers:
  - openai:gpt-4.1-mini

defaultTest:
  assert:
    - type: javascript
      value: file://assertions/validate-mdma.mjs
      config:
        exclude: [flow-ordering]

tests: tests-custom-prompt.yaml
