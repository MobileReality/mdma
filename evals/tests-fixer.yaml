# MDMA Fixer Prompt — Eval Test Cases
#
# Each test provides a brokenDocument containing intentionally broken MDMA
# blocks. The fixer prompt + validator pipeline sends remaining unfixed
# issues to the LLM. Assertions verify the output is a valid MDMA document.

# ---------------------------------------------------------------------------
# 1. Missing webhook trigger + invalid onSubmit target
# ---------------------------------------------------------------------------
- description: Fixes missing webhook trigger and broken action references
  vars:
    brokenDocument: |
      # Order Submission

      ```mdma
      type: form
      id: order-form
      fields:
        - name: product
          type: text
          label: Product Name
          required: true
        - name: quantity
          type: number
          label: Quantity
      onSubmit: nonexistent-handler
      ```

      ```mdma
      type: webhook
      id: order-webhook
      url: https://api.example.com/orders
      method: POST
      ```

      ```mdma
      type: callout
      id: order-status
      variant: success
      content: Your order has been submitted!
      ```
  assert:
    - type: javascript
      value: file://assertions/fixer-resolves-errors.mjs
    - type: javascript
      value: file://assertions/fixer-preserves-components.mjs
      config:
        min: 3
    - type: icontains
      value: trigger

# ---------------------------------------------------------------------------
