# ---------------------------------------------------------------------------
- description: Fixes unknown component type and missing button text
  vars:
    brokenDocument: |
      # Dashboard

      ```mdma
      type: card
      id: stats-card
      title: Monthly Stats
      value: 42
      ```

      ```mdma
      type: button
      id: refresh-btn
      variant: primary
      onAction: stats-card
      ```

      ```mdma
      type: callout
      id: dashboard-info
      variant: info
      content: Welcome to your dashboard
      ```
  assert:
    - type: javascript
      value: file://assertions/fixer-resolves-errors.mjs
    - type: javascript
      value: file://assertions/fixer-preserves-components.mjs
      config:
        min: 2

