# ---------------------------------------------------------------------------
# 12. Multi-step flow — user already completed step 1
# ---------------------------------------------------------------------------
- description: Splits multi-step flow to step 2 when step 1 was in prior message
  vars:
    conversationHistory:
      - role: user
        content: Start the employee onboarding process
      - role: assistant
        content: |
          # Employee Onboarding — Step 1

          ```mdma
          type: form
          id: personal-info
          fields:
            - name: full-name
              type: text
              label: Full Name
              required: true
            - name: email
              type: email
              label: Email
              required: true
              sensitive: true
          onSubmit: step-1-complete
          ```

          ```mdma
          type: callout
          id: step-1-complete
          variant: success
          content: Personal info saved!
          ```
      - role: user
        content: I've submitted the form. What's next?
    brokenDocument: |
      # Employee Onboarding — Step 2

      ```mdma
      type: form
      id: department-form
      fields:
        - name: department
          type: select
          label: Department
          options:
            - label: Engineering
              value: engineering
            - label: Marketing
              value: marketing
        - name: start-date
          type: date
          label: Start Date
      onSubmit: onboarding-tasks
      ```

      ```mdma
      type: tasklist
      id: onboarding-tasks
      items:
        - id: task-1
          text: Complete HR paperwork
        - id: task-2
          text: Setup workstation
      onComplete: welcome-callout
      ```

      ```mdma
      type: callout
      id: welcome-callout
      variant: success
      content: Welcome aboard!
      ```
  assert:
    - type: javascript
      value: file://assertions/fixer-resolves-errors.mjs
    - type: javascript
      value: file://assertions/fixer-preserves-components.mjs
      config:
        min: 1
    - type: javascript
      value: file://assertions/no-multi-step-flow.mjs
    - type: icontains
      value: department-form

