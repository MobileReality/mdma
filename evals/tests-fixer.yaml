  vars:
    brokenDocument: |
      # Support Ticket

      ```mdma
      type: form
      id: ticket-form
      fields:
        - name: subject
          type: text
          label: Subject
          required: true
        - name: priority
          type: select
          label: Priority
          options:
            - label: Low
              value: low
            - label: Medium
              value: medium
            - label: High
