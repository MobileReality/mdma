# ---------------------------------------------------------------------------
# 7. Circular action references + backward flow
# ---------------------------------------------------------------------------
- description: Fixes circular and backward action references
  vars:
    brokenDocument: |
      # Feedback Loop

      ```mdma
      type: form
      id: feedback-form
      fields:
        - name: rating
          type: number
          label: Rating
          required: true
        - name: comment
          type: textarea
          label: Comment
      onSubmit: review-gate
      ```

      ```mdma
      type: approval-gate
      id: review-gate
      title: Review Feedback
      requiredApprovers: 1
      onApprove: feedback-form
      onDeny: rejection-notice
      ```

      ```mdma
      type: callout
      id: rejection-notice
      variant: error
      content: Your feedback was not accepted. Please revise.
      ```
  assert:
    - type: javascript
      value: file://assertions/fixer-resolves-errors.mjs
    - type: javascript
      value: file://assertions/fixer-preserves-components.mjs
      config:
        min: 1

# ---------------------------------------------------------------------------
# 8. Mixed issues — kitchen sink
# ---------------------------------------------------------------------------
- description: Fixes a document with many different issue types
  vars:
    brokenDocument: |
      # Employee Onboarding

      ```mdma
      type: form
      id: employee_form
      fields:
        - name: full_name
          type: text
          label: TODO
          required: true
        - name: email
          type: email
        - name: department
          type: select
          label: Department
        - name: start_date
          type: date
          label: Start Date
      onSubmit: missing-handler
      ```

      ```mdma
      type: tasklist
      id: onboarding-tasks
      items:
        - id: task-1
          text: Complete HR paperwork
        - id: task-2
          text: Set up workstation
        - id: task-3
          text: Meet team lead
      onComplete: nonexistent-webhook
      ```

      ```mdma
      type: button
      id: employee_form
      variant: primary
      onClick: onboarding-tasks
      ```

      ```mdma
      type: webhook
      id: notify-hr
      url: https://api.example.com/hr
      method: POST
      ```
  assert:
    - type: javascript
      value: file://assertions/fixer-resolves-errors.mjs
    - type: javascript
      value: file://assertions/fixer-preserves-components.mjs
      config:
        min: 4
    - type: javascript
      value: file://assertions/unique-kebab-ids.mjs

