# ---------------------------------------------------------------------------
# 5. Table data key mismatch + chart axis mismatch
# ---------------------------------------------------------------------------
- description: Fixes table data key mismatch and chart axis errors
  vars:
    brokenDocument: |
      # Sales Report

      ```mdma
      type: table
      id: sales-table
      columns:
        - key: product
          header: Product
        - key: revenue
          header: Revenue
        - key: units
          header: Units Sold
      data:
        - product_name: Widget A
          total_revenue: 50000
          quantity: 120
        - product_name: Widget B
          total_revenue: 32000
          quantity: 85
      ```

      ```mdma
      type: chart
      id: sales-chart
      variant: bar
      data: |
        Month,Revenue,Costs
        Jan,10000,8000
        Feb,12000,9000
        Mar,15000,11000
      xAxis: Date
      yAxis:
        - Profit
        - Expenses
      ```
  assert:
    - type: javascript
      value: file://assertions/fixer-resolves-errors.mjs
    - type: javascript
      value: file://assertions/fixer-preserves-components.mjs
      config:
        min: 2

