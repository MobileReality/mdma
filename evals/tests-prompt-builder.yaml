      **Description:** Customer escalation workflow for high-priority support tickets. Captures customer details, issue history, and sentiment, then triggers internal review and resolution tracking.
      **Business Rules:** Customer email and phone are PII. Escalations open > 24 hours require manager approval. Resolution must include a customer satisfaction follow-up task. CRM webhook fires on status change.
