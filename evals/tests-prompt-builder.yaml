# CLI Prompt Builder — Eval Test Cases
#
# Each test sends a serialized user configuration to the Master Prompt.
# The LLM generates a `customPrompt` that should:
# - Use YAML (not JSON) in any mdma code block examples
# - Include domain-specific instructions
# - Reference the configured fields, trigger rules, and sensitive flags
# - NOT repeat the MDMA spec

# ---------------------------------------------------------------------------
# 1. KYC Verification — keyword trigger, finance domain
# ---------------------------------------------------------------------------
- description: "KYC verification flow with keyword triggers"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** kyc-verification
      **Domain:** finance
      **Description:** KYC case review flow that collects applicant identity data, runs compliance checks, and requires dual approval before account activation.
      **Business Rules:** Government ID and date of birth must be marked sensitive. Require 2 approvers with roles: compliance-officer, senior-analyst. PEP screening and sanctions list checks are mandatory before approval.
      **When to Display Components:** When the user says one of these keywords or phrases: start KYC review, new customer verification, verify identity. Only generate MDMA components when triggered by these phrases, otherwise respond with plain text.

      **Selected Components:**

      ### form
      Fields:
      - full_name (text, label: "Full Legal Name", required: true, sensitive: false)
      - date_of_birth (date, label: "Date of Birth", required: true, sensitive: true)
      - nationality (text, label: "Nationality", required: true, sensitive: false)
      - id_number (text, label: "Government ID Number", required: true, sensitive: true)
      - email (email, label: "Email Address", required: true, sensitive: true)

      ### thinking
  assert:
    - type: javascript
      value: file://assertions/yaml-not-json.mjs
    - type: javascript
      value: file://assertions/no-spec-repetition.mjs
    - type: javascript
      value: file://assertions/prompt-length.mjs
    - type: javascript
      value: file://assertions/prompt-has-sections.mjs
    - type: javascript
      value: file://assertions/mentions-trigger.mjs
      config:
        mode: keyword
        keywords: ["KYC", "verify identity", "customer verification"]
    - type: javascript
      value: file://assertions/mentions-fields.mjs
      config:
        fields: ["full_name", "date_of_birth", "id_number", "email", "nationality"]
        minRatio: 0.6
    - type: icontains
      value: "sensitive"
    - type: icontains
      value: "financ"

