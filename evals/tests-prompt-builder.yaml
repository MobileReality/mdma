# ===========================================================================
# TWO-STEP FORM TESTS (5-10)
# Verify: two distinct forms, correct trigger per step, forms not merged
# ===========================================================================

# ---------------------------------------------------------------------------
# 5. KYC 2-step — keyword form, then form-submit approval form
# ---------------------------------------------------------------------------
- description: "2-step: KYC data form → compliance review form"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** kyc-verification
      **Domain:** finance
      **Description:** KYC flow: first collect applicant data, then after submission collect compliance officer review notes.
      **Business Rules:** ID number and DOB are sensitive in step 1. Step 2 form is internal and not sensitive.

      **Conversation Flow:**

      Step 1 — Collect applicant data
        Trigger: When the user says: start KYC, verify identity
        Components:
        - **form**
          Fields:
          - full_name (text, label: "Full Legal Name", required: true, sensitive: false)
          - date_of_birth (date, label: "Date of Birth", required: true, sensitive: true)
          - id_number (text, label: "Government ID Number", required: true, sensitive: true)
          - email (email, label: "Email", required: true, sensitive: true)
        - **thinking**
        Show data collection form when triggered by keywords.

      Step 2 — Compliance review
        Trigger: After the user submits the form/component from the previous step
        Components:
        - **form**
          Fields:
          - reviewer_name (text, label: "Reviewer Name", required: true, sensitive: false)
          - risk_rating (select, label: "Risk Rating", required: true, sensitive: false)
          - review_notes (textarea, label: "Review Notes", required: true, sensitive: false)
        - **thinking**
        After applicant form is submitted, show the compliance review form.

      **All Component Types Used:** form, thinking
  assert:
    - type: javascript
      value: file://assertions/form-fields-match.mjs
      config:
        expectedForms:
          - fields: ["full_name", "date_of_birth", "id_number", "email"]
            sensitive: ["date_of_birth", "id_number", "email"]
          - fields: ["reviewer_name", "risk_rating", "review_notes"]
    - type: javascript
      value: file://assertions/respects-flow-order.mjs
      config:
        minSteps: 2
    - type: javascript
      value: file://assertions/mentions-trigger.mjs
      config:
        mode: multi-step
        steps:
          - mode: keyword
            keywords: ["KYC", "verify identity"]
          - mode: form-submit
    - type: llm-rubric
      value: |
        This config defines TWO DIFFERENT FORMS in sequential steps:
        Step 1: applicant data form (full_name, date_of_birth, id_number, email)
        Step 2: compliance review form (reviewer_name, risk_rating, review_notes)

        The prompt MUST:
        1. Describe two separate forms, not merge them into one
        2. Show form 1 ONLY on keyword trigger ("start KYC" / "verify identity")
        3. Show form 2 ONLY after form 1 is submitted
        4. NOT show both forms at the same time

        FAIL if forms are merged, or both shown simultaneously, or trigger timing is wrong.
        PASS if two distinct sequential forms with correct triggers are described.

# ---------------------------------------------------------------------------
# 6. Insurance claim 2-step — claim form then damage assessment form
# ---------------------------------------------------------------------------
- description: "2-step: insurance claim form → damage assessment form"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** insurance-claim
      **Domain:** insurance
      **Description:** Step 1 collects basic claim info. Step 2 collects damage details after initial review.
      **Business Rules:** Policy number is sensitive. Claims over $10k need manager review.

      **Conversation Flow:**

      Step 1 — File claim
        Trigger: When the user says: file claim, new claim, report damage
        Components:
        - **form**
          Fields:
          - claimant_name (text, label: "Claimant Name", required: true, sensitive: false)
          - policy_number (text, label: "Policy Number", required: true, sensitive: true)
          - incident_date (date, label: "Date of Incident", required: true, sensitive: false)
          - incident_description (textarea, label: "Incident Description", required: true, sensitive: false)
        - **thinking**

      Step 2 — Damage assessment
        Trigger: After the user submits the form/component from the previous step
        Components:
        - **form**
          Fields:
          - damage_type (select, label: "Damage Type", required: true, sensitive: false)
          - estimated_cost (number, label: "Estimated Repair Cost ($)", required: true, sensitive: false)
          - photos_attached (checkbox, label: "Photos Attached", required: false, sensitive: false)
          - adjuster_notes (textarea, label: "Adjuster Notes", required: false, sensitive: false)
        - **thinking**

      **All Component Types Used:** form, thinking
  assert:
    - type: javascript
      value: file://assertions/form-fields-match.mjs
      config:
        expectedForms:
          - fields: ["claimant_name", "policy_number", "incident_date", "incident_description"]
            sensitive: ["policy_number"]
          - fields: ["damage_type", "estimated_cost", "photos_attached", "adjuster_notes"]
    - type: javascript
      value: file://assertions/respects-flow-order.mjs
      config:
        minSteps: 2
    - type: llm-rubric
      value: |
        Two sequential forms: claim info (step 1) then damage assessment (step 2).
        They must NOT be merged. Step 2 only appears after step 1 is submitted.
        FAIL if forms are combined into one or shown at the same time.
        PASS if clearly two distinct sequential forms.

