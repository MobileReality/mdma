# ===========================================================================
# COMPONENT SCOPE COMPLIANCE TESTS (21-25)
#
# These tests verify the LLM only includes components that were explicitly
# requested. The user reported that requesting only "form + thinking" still
# generates approval-gates, tasklists, webhooks, etc.
# Each test uses llm-rubric to catch hallucinated components.
# ===========================================================================

# ---------------------------------------------------------------------------
# 21. Form-only — must NOT add approval-gate, tasklist, webhook, button, etc.
# ---------------------------------------------------------------------------
- description: "Form-only config must not hallucinate extra components"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** incident-triage
      **Domain:** engineering
      **Description:** Production incident triage workflow that captures severity, affected services, and timeline, then routes through an on-call approval gate before executing remediation steps.
      **Business Rules:** Severity P1/P2 incidents require VP-level approval. All incidents must have a root cause analysis tasklist completed within 48 hours. Slack and PagerDuty webhooks must fire on escalation.
      **When to Display Components:** Immediately when the conversation starts — always respond with MDMA components in the first message.

      **Selected Components:**

      ### form
      Fields:
      - incident_title (text, label: "Incident Title", required: true, sensitive: false)
      - severity (select, label: "Severity Level", required: true, sensitive: false)
      - affected_services (textarea, label: "Affected Services", required: true, sensitive: false)
      - start_time (date, label: "Incident Start Time", required: true, sensitive: false)
      - reporter_email (email, label: "Reporter Email", required: true, sensitive: true)
      - customer_impact (textarea, label: "Customer Impact Description", required: true, sensitive: false)
      - estimated_users (number, label: "Estimated Users Affected", required: false, sensitive: false)

      ### thinking
  assert:
    - type: javascript
      value: file://assertions/yaml-not-json.mjs
    - type: javascript
      value: file://assertions/no-spec-repetition.mjs
    - type: javascript
      value: file://assertions/prompt-length.mjs
    - type: javascript
      value: file://assertions/mentions-trigger.mjs
      config:
        mode: immediate
    - type: javascript
      value: file://assertions/mentions-fields.mjs
      config:
        fields: ["incident_title", "severity", "affected_services", "reporter_email", "customer_impact"]
        minRatio: 0.5
    - type: llm-rubric
      value: |
        The user's configuration ONLY requested these components: form and thinking.
        The generated custom prompt MUST NOT include instructions, examples, or sections
        for any of these unrequested components: approval-gate, tasklist, webhook, button,
        table, chart, callout.

        Evaluate the output and FAIL if:
        - It contains a ```mdma block with type: approval-gate, type: tasklist, type: webhook,
          type: button, type: table, type: chart, or type: callout
        - It contains sections titled "Approval Gate", "Tasklist", "Webhook", "Button",
          "Table", or "Chart" that provide instructions to generate those components
        - It describes workflow logic involving components that were not requested

        PASS if the output only describes form and thinking components.
        Minor references to other component types in general context (e.g., "MDMA supports
        approval-gates") are acceptable, but specific instructions to generate them are not.

