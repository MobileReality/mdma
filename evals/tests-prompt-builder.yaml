# 9. Customer escalation 2-step — contextual trigger then review form
# ---------------------------------------------------------------------------
- description: "2-step: escalation form (contextual) → resolution form (form-submit)"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** customer-escalation
      **Domain:** customer-ops
      **Description:** Detect escalation from conversation context, collect details, then collect resolution notes.
      **Business Rules:** Customer email is PII.

      **Conversation Flow:**

      Step 1 — Detect and capture escalation
        Trigger: After 3 failed resolution attempts, or when the customer asks for a supervisor.
        Components:
        - **form**
          Fields:
          - customer_email (email, label: "Customer Email", required: true, sensitive: true)
          - ticket_id (text, label: "Ticket ID", required: true, sensitive: false)
          - priority (select, label: "Priority", required: true, sensitive: false)
          - issue_summary (textarea, label: "Issue Summary", required: true, sensitive: false)
        - **thinking**

      Step 2 — Resolution notes
        Trigger: After the user submits the form/component from the previous step
        Components:
        - **form**
          Fields:
          - resolved_by (text, label: "Resolved By", required: true, sensitive: false)
          - resolution_type (select, label: "Resolution Type", required: true, sensitive: false)
          - resolution_notes (textarea, label: "Resolution Notes", required: true, sensitive: false)
          - follow_up_needed (checkbox, label: "Follow-up Needed", required: false, sensitive: false)
        - **thinking**

      **All Component Types Used:** form, thinking
  assert:
    - type: javascript
      value: file://assertions/form-fields-match.mjs
      config:
        expectedForms:
          - fields: ["customer_email", "ticket_id", "priority", "issue_summary"]
            sensitive: ["customer_email"]
          - fields: ["resolved_by", "resolution_type", "resolution_notes", "follow_up_needed"]
    - type: javascript
      value: file://assertions/mentions-trigger.mjs
      config:
        mode: multi-step
        steps:
          - mode: contextual
            keywords: ["frustrat", "supervisor", "failed", "attempt"]
          - mode: form-submit
    - type: javascript
      value: file://assertions/respects-flow-order.mjs
      config:
        minSteps: 2

