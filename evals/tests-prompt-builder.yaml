          Fields:
          - reviewer_name (text, label: "Reviewer Name", required: true, sensitive: false)
          - risk_rating (select, label: "Risk Rating", required: true, sensitive: false)
          - findings_summary (textarea, label: "Findings Summary", required: true, sensitive: false)
          - remediation_required (checkbox, label: "Remediation Required", required: false, sensitive: false)
        - **thinking**

      **All Component Types Used:** form, thinking
  assert:
    - type: javascript
      value: file://assertions/form-fields-match.mjs
      config:
        expectedForms:
          - fields: ["entity_name", "tax_id", "audit_period", "entity_type"]
            sensitive: ["tax_id"]
