# CLI Prompt Builder — Eval Test Cases
#
# 10 focused tests verifying:
# - Generated forms have correct fields, types, and sensitive flags
# - 2-step flows produce two distinct forms at the right moments
# - Trigger timing is correct (step 1 vs step 2)
# - MDMA examples are valid YAML with proper schema
#
# Default assertions (yaml-not-json + validate-mdma-examples) run on every test.

# ===========================================================================
# SINGLE-STEP FORM TESTS (1-4)
# Verify the LLM generates forms with the exact fields configured
# ===========================================================================

# ---------------------------------------------------------------------------
# 1. KYC form — keyword trigger, sensitive fields
# ---------------------------------------------------------------------------
- description: "Single form: KYC with sensitive PII fields"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** kyc-verification
      **Domain:** finance
      **Description:** KYC case review flow that collects applicant identity data.

      **Conversation Flow:**

      Step 1 — Collect applicant data
        Trigger: When the user says: start KYC review, verify identity
        Components:
        - **form**
          Fields:
          - full_name (text, label: "Full Legal Name", required: true, sensitive: false)
          - date_of_birth (date, label: "Date of Birth", required: true, sensitive: true)
          - id_number (text, label: "Government ID Number", required: true, sensitive: true)
          - email (email, label: "Email Address", required: true, sensitive: true)
          - nationality (text, label: "Nationality", required: true, sensitive: false)
        - **thinking**

      **All Component Types Used:** form, thinking
  assert:
    - type: javascript
      value: file://assertions/form-fields-match.mjs
      config:
        expectedForms:
          - fields: ["full_name", "date_of_birth", "id_number", "email", "nationality"]
            sensitive: ["date_of_birth", "id_number", "email"]
    - type: javascript
      value: file://assertions/mentions-trigger.mjs
      config:
        mode: keyword
        keywords: ["KYC", "verify identity"]
    - type: javascript
      value: file://assertions/prompt-length.mjs
    - type: llm-rubric
      value: |
        The generated prompt must instruct the AI to show a KYC form ONLY when
        the user says "start KYC review" or "verify identity". It should NOT
        show the form immediately or unconditionally.
        PASS if the trigger timing is clearly keyword-based.
        FAIL if the prompt says to show the form immediately or always.

# ---------------------------------------------------------------------------
# 2. Patient intake — immediate trigger, all-sensitive form
# ---------------------------------------------------------------------------
- description: "Single form: patient intake with immediate trigger and HIPAA"
  vars:
    request: |
      Generate a custom prompt based on this configuration:

      ## User Configuration

      **Flow Name:** patient-intake
      **Domain:** healthcare
      **Description:** Patient intake form for clinical assessment.
      **Business Rules:** All patient identity fields must be sensitive. HIPAA compliance required.

      **Conversation Flow:**

      Step 1 — Patient information
        Trigger: Immediately when the conversation starts
        Components:
        - **form**
          Fields:
          - patient_name (text, label: "Patient Full Name", required: true, sensitive: true)
          - date_of_birth (date, label: "Date of Birth", required: true, sensitive: true)
          - ssn (text, label: "Social Security Number", required: true, sensitive: true)
          - insurance_id (text, label: "Insurance ID", required: true, sensitive: true)
          - allergies (textarea, label: "Known Allergies", required: true, sensitive: false)
          - symptoms (textarea, label: "Current Symptoms", required: true, sensitive: false)
        - **thinking**

      **All Component Types Used:** form, thinking
  assert:
    - type: javascript
      value: file://assertions/form-fields-match.mjs
      config:
        expectedForms:
          - fields: ["patient_name", "date_of_birth", "ssn", "insurance_id", "allergies", "symptoms"]
            sensitive: ["patient_name", "date_of_birth", "ssn", "insurance_id"]
    - type: javascript
      value: file://assertions/mentions-trigger.mjs
      config:
        mode: immediate
    - type: icontains
      value: "HIPAA"
    - type: llm-rubric
      value: |
        The prompt must instruct the AI to show the patient intake form
        IMMEDIATELY in the first message, not after a keyword or condition.
        PASS if the timing is clearly immediate/first-message.
        FAIL if it requires a keyword or condition.

