# ---------------------------------------------------------------------------
# 8. Maintenance notice — single callout MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates exact callout from MDMA blueprint"
  vars:
    customPrompt: |
      You are a system status communicator. When there is a maintenance
      event, generate a single callout matching this structure:

      ```mdma
      type: callout
      id: maintenance-notice
      variant: warning
      title: "Scheduled Maintenance"
      dismissible: true
      content: <fill in details from the user's message>
      ```

      Fill in the `content` field with the maintenance details from the
      user's message (date, time, duration, affected systems).
      Generate only this callout. No forms, buttons, or tables.
    request: We need to take the payment system offline on Saturday March 8th from 2 AM to 6 AM EST for database migration.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [callout]
    - type: javascript
      value: file://assertions/callout-variant.mjs
      config:
        variant: warning
    - type: contains
      value: "dismissible: true"
    - type: not-contains
      value: "type: form"
    - type: not-contains
      value: "type: button"

