        Rating, Count
        Very Satisfied, 42
        Satisfied, 28
        Neutral, 15
        Unsatisfied, 10
        Very Unsatisfied, 5
      ```

      Generate only these two components. No buttons, tables, or callouts.
    request: I need to collect customer feedback for this quarter.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, chart]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 4
    - type: javascript
      value: file://assertions/pie-chart.mjs
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-sensitive.mjs

# ---------------------------------------------------------------------------
# 4. Expense report — form + approval-gate + button MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates exact expense workflow from MDMA blueprint"
  vars:
    customPrompt: |
      You are a finance assistant. When a user submits an expense, always
      generate exactly these three components in this order:

      ```mdma
      type: form
      id: expense-form
      fields:
        - name: amount
          type: number
          label: "Amount ($)"
          required: true
        - name: category
          type: select
          label: "Category"
          options:
            - label: Travel
              value: travel
            - label: Equipment
              value: equipment
            - label: Software
              value: software
            - label: Meals
              value: meals
            - label: Other
              value: other
        - name: date
          type: date
          label: "Expense Date"
          required: true
        - name: receipt-desc
          type: textarea
          label: "Receipt Description"
        - name: receipt-number
          type: text
          label: "Receipt Number"
      onSubmit: approve-expense
      ```

      ```mdma
      type: approval-gate
      id: expense-approval
      title: "Manager Approval"
      description: "Expenses over $100 require manager sign-off."
      requiredApprovers: 1
      ```

      ```mdma
      type: button
      id: submit-expense
      text: "Submit Expense"
      variant: primary
      onAction: approve-expense
      ```

      Generate only these three components. No callouts, tables, charts, or webhooks.
    request: I need to expense a $250 flight for the NYC conference.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, approval-gate, button]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 5
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: contains
      value: "type: approval-gate"
    - type: contains
      value: "requiredApprovers: 1"
    - type: contains
      value: "type: button"

# ---------------------------------------------------------------------------
# 5. IT ticket — form + webhook MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates IT ticket form with webhook integration"
  vars:
    customPrompt: |
      You are an IT helpdesk assistant. When a user reports an issue,
      always generate exactly these two components:

      ```mdma
      type: form
      id: it-ticket
      fields:
        - name: requester-email
          type: email
          label: "Your Email"
          required: true
          sensitive: true
        - name: issue-type
          type: select
          label: "Issue Type"
          options:
            - label: Hardware
              value: hardware
            - label: Software
              value: software
            - label: Network
              value: network
            - label: "Access / Permissions"
              value: access
            - label: Other
              value: other
        - name: priority
          type: select
          label: "Priority"
          options:
            - label: Low
              value: low
            - label: Medium
              value: medium
            - label: High
              value: high
            - label: Urgent
              value: urgent
        - name: description
          type: textarea
          label: "Describe the Issue"
          required: true
      onSubmit: submit-ticket
      ```

      ```mdma
      type: webhook
      id: ticket-webhook
      url: "https://it-api.internal.company.com/tickets"
      method: POST
      trigger: submit-ticket
      ```

      Generate only these two components. No buttons, callouts, or tables.
    request: My monitor stopped working this morning and I can't do any visual design work.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, webhook]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 4
    - type: javascript
      value: file://assertions/has-webhook.mjs
    - type: javascript
      value: file://assertions/has-sensitive.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 2

# ---------------------------------------------------------------------------
# 6. Sales dashboard — table + bar chart MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates prescribed sales table and bar chart"
  vars:
    customPrompt: |
      You are a sales analytics assistant. When asked for a sales report,
      always generate exactly these two components:

      ```mdma
      type: table
      id: sales-table
      sortable: true
      filterable: true
      columns:
        - key: region
          header: "Region"
          sortable: true
        - key: revenue
          header: "Revenue ($)"
          sortable: true
        - key: deals
          header: "Deals Closed"
          sortable: true
        - key: target
          header: "Target ($)"
      data:
        - { region: "North America", revenue: 1250000, deals: 48, target: 1200000 }
        - { region: "Europe", revenue: 890000, deals: 35, target: 900000 }
        - { region: "Asia Pacific", revenue: 620000, deals: 22, target: 700000 }
        - { region: "Latin America", revenue: 340000, deals: 15, target: 400000 }
      ```

      ```mdma
      type: chart
      id: sales-chart
      variant: bar
      label: "Revenue by Region"
      data: |
        Region, Revenue
        North America, 1250000
        Europe, 890000
        Asia Pacific, 620000
        Latin America, 340000
      xAxis: Region
      ```

      Generate only these two components. No forms, buttons, or callouts.
    request: Show me the Q4 sales performance breakdown.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [table, chart]
    - type: javascript
      value: file://assertions/table-features.mjs
    - type: javascript
      value: file://assertions/bar-chart.mjs
    - type: not-contains
      value: "type: form"
    - type: not-contains
      value: "type: button"

