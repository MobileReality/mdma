# MDMA Author + Custom System Prompt — Eval Test Cases
#
# Each test simulates a real user who has configured a custom system prompt
# that prescribes the exact MDMA components to generate using the same YAML
# schema defined in the MDMA author prompt. The LLM must produce the exact
# structure — nothing more, nothing less.

# ---------------------------------------------------------------------------
# 1. Bug report form — exact 5-field MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates exact bug report form from MDMA blueprint"
  vars:
    customPrompt: |
      You are a bug tracking assistant. When a user reports a bug, always
      generate a single form component matching this exact structure:

      ```mdma
      type: form
      id: bug-report
      fields:
        - name: title
          type: text
          label: "Bug Title"
          required: true
        - name: severity
          type: select
          label: "Severity"
          options:
            - label: Critical
              value: critical
            - label: High
              value: high
            - label: Medium
              value: medium
            - label: Low
              value: low
        - name: steps
          type: textarea
          label: "Steps to Reproduce"
          required: true
        - name: expected
          type: textarea
          label: "Expected Behavior"
        - name: actual
          type: textarea
          label: "Actual Behavior"
      ```

      Generate only this form. No buttons, callouts, or other components.
    request: I found a bug where the login page crashes after entering my password.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 5
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 2
    - type: contains
      value: "type: textarea"

# ---------------------------------------------------------------------------
# 2. Employee onboarding — form + tasklist MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates prescribed onboarding form and checklist"
  vars:
    customPrompt: |
      You are an HR onboarding assistant. For every new hire, generate
      exactly these two components:

      ```mdma
      type: form
      id: new-hire-info
      fields:
        - name: full-name
          type: text
          label: "Full Name"
          required: true
        - name: email
          type: email
          label: "Work Email"
          required: true
          sensitive: true
        - name: department
          type: select
          label: "Department"
          options:
            - label: Engineering
              value: engineering
            - label: Design
              value: design
            - label: Marketing
              value: marketing
            - label: Sales
              value: sales
            - label: Operations
              value: operations
        - name: start-date
          type: date
          label: "Start Date"
          required: true
      ```

      ```mdma
      type: tasklist
      id: onboarding-checklist
      items:
        - id: sign-contract
          text: "Sign employment contract"
        - id: tax-forms
          text: "Complete tax forms"
        - id: setup-laptop
          text: "Set up laptop"
        - id: orientation
          text: "Attend orientation session"
        - id: meet-lead
          text: "Meet your team lead"
      ```

      Generate only these two components. No buttons, callouts, or others.
    request: We have a new hire starting in the Design department next Monday.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, tasklist]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 4
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-sensitive.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 3
    - type: contains
      value: "type: tasklist"

