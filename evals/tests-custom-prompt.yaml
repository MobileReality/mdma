      id: feedback-form
      fields:
        - name: customer-name
          type: text
          label: "Customer Name"
        - name: email
          type: email
          label: "Email"
          sensitive: true
        - name: rating
          type: select
          label: "Satisfaction Rating"
          options:
            - label: "1 - Very Unsatisfied"
              value: "1"
            - label: "2 - Unsatisfied"
              value: "2"
            - label: "3 - Neutral"
              value: "3"
            - label: "4 - Satisfied"
              value: "4"
            - label: "5 - Very Satisfied"
              value: "5"
        - name: feedback
          type: textarea
          label: "Comments"
      ```

      ```mdma
      type: chart
      id: satisfaction-chart
