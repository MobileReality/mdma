# ---------------------------------------------------------------------------
# 11. Account deletion — button with confirmation dialog MDMA blueprint
# ---------------------------------------------------------------------------
- description: "Generates exact danger button with confirmation"
  vars:
    customPrompt: |
      You are an account management assistant. When a user wants to
      delete their account, generate a single button matching this structure:

      ```mdma
      type: button
      id: delete-account
      text: "Delete My Account"
      variant: danger
      onAction: delete-account-action
      confirm:
        title: "Are you sure?"
        message: "This action is permanent. All your data will be deleted and cannot be recovered."
        confirmText: "Yes, delete my account"
        cancelText: "Cancel"
      ```

      Generate only this button. No forms, callouts, or tables.
      The surrounding prose should explain what will happen.
    request: I want to close my account and delete all my data.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [button]
    - type: contains
      value: "variant: danger"
    - type: javascript
      value: file://assertions/has-confirm.mjs
    - type: not-contains
      value: "type: form"
    - type: not-contains
      value: "type: table"
    - type: not-contains
      value: "type: callout"
