# MDMA Author Prompt — promptfoo evaluation config
#
# Run:  pnpm --filter @mdma/evals eval
# View: pnpm --filter @mdma/evals eval:view

description: MDMA Author Prompt Eval

envPath: .env
outputPath: results.json

prompts:
  - file://prompt.mjs

providers:
  - openai:gpt-4.1-mini

defaultTest:
  assert:
    # Every test case runs the MDMA validator as a baseline check
    - type: javascript
      value: file://assertions/validate-mdma.mjs

tests: tests.yaml
