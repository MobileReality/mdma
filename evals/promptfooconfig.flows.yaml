# MDMA Example Flow Custom Prompts — promptfoo evaluation config
#
# Tests that each example flow's custom prompt produces valid MDMA documents
# with the correct component types and domain-specific content.
#
# Run:  pnpm --filter @mobile-reality/mdma-evals eval:flows
# View: pnpm --filter @mobile-reality/mdma-evals eval:view

description: MDMA Example Flow Custom Prompts Eval

envPath: .env
outputPath: results-flows.json

prompts:
  - file://prompt-custom.mjs

providers:
  - openai:gpt-4.1-mini

defaultTest:
  assert:
    - type: javascript
      value: file://assertions/validate-mdma.mjs

tests: tests-flows.yaml
