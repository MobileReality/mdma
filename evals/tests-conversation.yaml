# MDMA Conversation Tests
#
# Multi-turn tests where Turn 1 prescribes an exact MDMA blueprint via
# customPrompt and the user request triggers generation. Turn 2+ simulates
# an end-user interacting with the assistant — asking questions, chatting,
# discussing the form. The MDMA structure must NEVER be regenerated or
# modified by end-user messages.
#
# We verify:
#   - Follow-ups do NOT regenerate MDMA components
#   - No raw YAML leaks into visible prose
#   - The assistant responds conversationally

# ===================================================================
# Conversation 1 — User asks about the form they see
# ===================================================================

# Turn 1: Generate a contact form from blueprint
- description: "Conv 1/T1: Generate contact form from blueprint"
  vars:
    customPrompt: |
      You are a customer support assistant. When asked for a contact form,
      generate exactly this component:

      ```mdma
      type: form
      id: contact-form
      fields:
        - name: full-name
          type: text
          label: "Full Name"
          required: true
        - name: email
          type: email
          label: "Email Address"
          required: true
          sensitive: true
        - name: message
          type: textarea
          label: "Message"
          required: true
      ```

      Generate only this form. No buttons, callouts, or other components.
    message: I need a contact form for our support page.
  metadata:
    conversationId: conv-1
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 3
    - type: javascript
      value: file://assertions/no-yaml-leak.mjs

# Turn 2: User asks why email is marked sensitive
- description: "Conv 1/T2: User asks about sensitive field — no regeneration"
  vars:
    customPrompt: |
      You are a customer support assistant. When asked for a contact form,
      generate exactly this component:

      ```mdma
      type: form
      id: contact-form
      fields:
        - name: full-name
          type: text
          label: "Full Name"
          required: true
        - name: email
          type: email
          label: "Email Address"
          required: true
          sensitive: true
        - name: message
          type: textarea
          label: "Message"
          required: true
      ```

      Generate this form only once when the user first requests it.
      For any follow-up questions, respond conversationally in plain text
      without regenerating the form.
    message: Why is the email field treated differently from the other fields?
  metadata:
    conversationId: conv-1
  assert:
    - type: javascript
      value: file://assertions/no-mdma-regeneration.mjs
    - type: javascript
      value: file://assertions/no-yaml-leak.mjs

