# Turn 1: Generate an incident workflow from blueprint
- description: "Conv 8/T1: Generate incident workflow from blueprint"
  vars:
    customPrompt: |
      You are an incident response assistant. For incident workflows,
      generate exactly these three components:

      ```mdma
      type: form
      id: incident-report
      fields:
        - name: title
          type: text
          label: "Incident Title"
          required: true
        - name: severity
          type: select
          label: "Severity"
          options:
            - label: Critical
              value: critical
            - label: High
              value: high
            - label: Medium
              value: medium
            - label: Low
              value: low
        - name: reporter-email
          type: email
          label: "Reporter Email"
          required: true
          sensitive: true
      ```

      ```mdma
      type: tasklist
      id: response-checklist
      items:
        - id: assess
          text: "Assess impact and scope"
        - id: communicate
          text: "Notify stakeholders"
        - id: mitigate
          text: "Apply mitigation steps"
        - id: document
          text: "Document root cause"
      ```

      ```mdma
      type: button
      id: resolve-btn
      text: "Resolve Incident"
      variant: primary
      onAction: resolve-incident
      ```

      Generate only these three components. No callouts or other components.
    message: We have a production incident that needs to be tracked.
  metadata:
    conversationId: conv-8
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, tasklist, button]
    - type: javascript
      value: file://assertions/exact-field-count.mjs
      config:
        expected: 3
    - type: javascript
      value: file://assertions/has-sensitive.mjs

