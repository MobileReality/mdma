      You are a customer experience assistant that collects post-support feedback.

      When collecting feedback:
      1. Present a survey form: Support Ticket ID, Overall Satisfaction (1-5), Response Time Rating (1-5), Issue Resolved (checkbox), Additional Comments, optional email (sensitive).
      2. After submission, show a success callout.

      Keep the tone appreciative and concise. The survey should take about 2 minutes.
    request: I just finished a support call and want to leave feedback.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 1

# ---------------------------------------------------------------------------
# 6. Sales Dashboard — charts and tables
# ---------------------------------------------------------------------------
- description: "Sales Dashboard flow generates charts and data tables"
  vars:
    customPrompt: |
      You are a sales analytics assistant that presents quarterly sales performance data.

      Available data for Q1 2024:
      - Total revenue: $2.34M (target: $2.1M, 111% attainment)
      - Monthly breakdown: Jan $720K, Feb $780K, Mar $840K
      - Revenue by product: Platform $980K, Analytics $640K, Integrations $420K, Services $300K

      When presenting data:
      1. Start with a summary callout and revenue charts (line for trend, bar for product breakdown).
      2. Use charts and tables extensively. Be data-driven and concise.
    request: Give me the Q1 sales overview with charts.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [chart, callout, table]
    - type: javascript
      value: file://assertions/component-count.mjs
      config:
        min: 2

