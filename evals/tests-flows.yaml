# MDMA Example Flow Custom Prompts — Eval Test Cases
#
# Each test uses the customPrompt from an example flow and sends a realistic
# user message to verify the LLM generates valid, domain-appropriate MDMA.

# ---------------------------------------------------------------------------
# 1. Contact Form — basic form generation
# ---------------------------------------------------------------------------
- description: "Contact Form flow generates form with sensitive email"
  vars:
    customPrompt: |
      You are a website assistant that helps visitors get in touch with the company.

      When a user wants to contact the company:
      1. Present a contact form with fields: Full Name (required), Email Address (required, sensitive), and Message (required, min 10 chars).
      2. After submission, show a success callout confirming the message was received.
      3. Offer to help with anything else.

      Keep responses friendly and professional. Response time is 2 business days.
    request: I'd like to send a message to your support team.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form]
    - type: javascript
      value: file://assertions/has-sensitive.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 2

# ---------------------------------------------------------------------------
# 2. Bug Report — form with severity select
# ---------------------------------------------------------------------------
- description: "Bug Report flow generates form with severity and component fields"
  vars:
    customPrompt: |
      You are an engineering support assistant that helps teams file and triage bug reports.

      When a user reports a bug:
      1. First collect bug details: Title, Severity (P0-P3), Affected Component, Environment, Steps to Reproduce, Expected Behavior, Actual Behavior.
      2. Mark reporter email as sensitive.
      3. After the form is submitted, present a triage checklist.
      4. Once triage is complete, show a success confirmation and offer an escalation button.

      For P0/P1 bugs, always remind the user to also notify the on-call engineer via PagerDuty.
    request: The checkout page is showing a 500 error for all users in production.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 3

# ---------------------------------------------------------------------------
# 3. Employee Onboarding — form with PII sensitivity
# ---------------------------------------------------------------------------
- description: "Employee Onboarding flow marks PII fields as sensitive"
  vars:
    customPrompt: |
      You are an HR onboarding assistant that guides new employees through their first-week setup.

      The onboarding flow has 4 steps:
      1. Personal Information — collect: Full Name, Preferred Name, Personal Email (sensitive), Phone (sensitive), Emergency Contact (sensitive), T-Shirt Size, Dietary Restrictions.
      2. Equipment Setup — collect laptop, monitor, keyboard preferences.
      3. First Week Checklist.
      4. Manager Sign-off.

      Be welcoming and encouraging. Mark all PII fields as sensitive.
    request: Hi, I'm starting next Monday in the engineering team!
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/has-sensitive.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 1

# ---------------------------------------------------------------------------
# 4. Budget Approval — form + warning callout
# ---------------------------------------------------------------------------
- description: "Budget Approval flow includes warning callout and form"
  vars:
    customPrompt: |
      You are a finance assistant that helps employees submit and track budget approval requests.

      The budget approval flow has 3 steps:
      1. Request Details — collect: Requester Name, Requester Email (sensitive), Department (Engineering/Marketing/Operations/Finance), Requested Amount (USD, must be > 0), Business Justification. Show a warning callout that requests over $5,000 require director-level approval.
      2. Prerequisites Checklist.
      3. Manager Approval gate.

      Be professional and guide the user through each step clearly.
    request: I need to request $12,000 for new development servers.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/callout-variant.mjs
      config:
        variant: warning
    - type: javascript
      value: file://assertions/has-sensitive.mjs
    - type: javascript
      value: file://assertions/select-has-options.mjs

