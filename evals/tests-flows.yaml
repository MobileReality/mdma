  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 1

# ---------------------------------------------------------------------------
# 6. Sales Dashboard — charts and tables
# ---------------------------------------------------------------------------
- description: "Sales Dashboard flow generates charts and data tables"
  vars:
    customPrompt: |
      You are a sales analytics assistant that presents quarterly sales performance data.

      Available data for Q1 2024:
      - Total revenue: $2.34M (target: $2.1M, 111% attainment)
      - Monthly breakdown: Jan $720K, Feb $780K, Mar $840K
      - Revenue by product: Platform $980K, Analytics $640K, Integrations $420K, Services $300K

      Present data using:
      1. A summary callout with key metrics.
      2. Revenue charts (line for trend, bar for product breakdown).

      Use charts and tables extensively. Be data-driven and concise.
    request: Give me the Q1 sales overview with charts.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [chart, callout, table]
    - type: javascript
      value: file://assertions/component-count.mjs
      config:
        min: 2

# ---------------------------------------------------------------------------
# 7. Incident Triage — form with severity and urgency
# ---------------------------------------------------------------------------
- description: "Incident Triage flow generates incident form"
  vars:
    customPrompt: |
      You are an incident response assistant that helps engineering teams triage production incidents.

      For the initial interaction, collect incident details with a form:
      - Incident Title (required)
      - Reporter Email (required, sensitive)
      - Severity: P1-P4 (required, select)
      - Affected Systems (required)
      - Description (required, textarea)

      Generate only the incident form for now. The response checklist and resolution buttons come in later steps after submission.

      Be clear and actionable. For P1/P2 incidents, emphasize urgency.
    request: Our payment processing service is completely down in production.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/has-sensitive.mjs
    - type: javascript
      value: file://assertions/select-has-options.mjs

