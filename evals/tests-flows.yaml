# ---------------------------------------------------------------------------
# 9. Sprint Retrospective — charts with sprint data
# ---------------------------------------------------------------------------
- description: "Sprint Retro flow generates velocity charts"
  vars:
    customPrompt: |
      You are a scrum master assistant that facilitates sprint retrospectives.

      Sprint 24 context:
      - Team: Platform Engineering, Sprint: Mar 4-15, 2024
      - Velocity: 42 points (target: 45)
      - Historical velocity: Sprint 19: 38/40, Sprint 20: 44/42, Sprint 21: 41/45, Sprint 22: 43/43, Sprint 23: 47/45
      - Bug distribution: Auth Service 5, API Gateway 3, Frontend 7, Database 2, CI/CD 1

      Show sprint info callout and velocity chart(s). Use charts to visualize data.
    request: Let's start the Sprint 24 retrospective.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [chart, callout, form]
    - type: javascript
      value: file://assertions/component-count.mjs
      config:
        min: 2

# ---------------------------------------------------------------------------
# 10. Order Tracking — table with order items
# ---------------------------------------------------------------------------
- description: "Order Tracking flow generates order table and milestones"
  vars:
    customPrompt: |
      You are a customer service assistant for an e-commerce store.

      Order #ORD-2024-78542 details:
      - Items: Wireless Keyboard ($79.99, Shipped), USB-C Hub x2 ($34.99 ea, Shipped), Monitor Stand ($129.99, Processing), Cable Management Kit ($19.99, Shipped)
      - Status: In Transit. Estimated delivery: March 22, 2024.

      Show order status callout and items table (sortable). You may also show delivery milestones as a tasklist.

      IMPORTANT: In tasklist items, the `checked` field must be a boolean value (true or false), never a string.
    request: Where is my order ORD-2024-78542?
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [table, callout, tasklist, chart, button]
    - type: javascript
      value: file://assertions/component-count.mjs
      config:
        min: 2

# ---------------------------------------------------------------------------
# 11. Change Management — form with risk levels
# ---------------------------------------------------------------------------
- description: "Change Management flow generates change request form with risk assessment"
  vars:
    customPrompt: |
      You are a release management assistant for SOX/ISO compliance.

      For the initial interaction, generate:
      1. A warning callout about risk assessment requirements and SOX compliance.
      2. A change request form with fields: Change Request ID (required), JIRA Ticket (required), Change Title (required), Change Type (required, select: Standard/Normal/Emergency), Target Environment (required, select: Production/Staging/Pre-prod), Risk Level (required, select: Low/Medium/High/Critical), Change Description (required, textarea), Rollback Plan (required, textarea).

      Generate only the warning callout and form. Pre-deployment checklist and dual approvals come in later steps.
    request: I need to deploy a database migration to production this weekend.
  assert:
    - type: javascript
      value: file://assertions/only-components.mjs
      config:
        allowed: [form, callout]
    - type: javascript
      value: file://assertions/callout-variant.mjs
      config:
        variant: warning
    - type: javascript
      value: file://assertions/select-has-options.mjs
    - type: javascript
      value: file://assertions/has-required-fields.mjs
      config:
        min: 3

